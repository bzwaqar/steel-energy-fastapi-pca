<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Steel Industry Energy Analytics{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header class="header-glass">
        <nav class="navbar">
            <div class="navbar-brand">
                <i class="logo-icon">⚡</i> Steel Energy
            </div>
            <div class="navbar-links">
                <a href="/" class="{% block nav_home %}{% endblock %}">Home</a>
                <a href="/dashboard" class="{% block nav_dashboard %}{% endblock %}">Dashboard</a>
                <a href="/predict" class="{% block nav_predict %}{% endblock %}">Predict</a>
            </div>
        </nav>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>© 2026 Steel Industry Energy Consumption Analytics. Powered by PCA + XGBoost Machine Learning Pipeline.</p>
    </footer>
</body>
</html>
